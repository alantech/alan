name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: ${{ github.workspace }}/.cargo

jobs:
  test:
    runs-on: [self-hosted, linux, X64]
    steps:
    - uses: actions/checkout@v4
    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    - name: Update branch URLs for testing
      run: ./scripts/update_branch_urls.sh
    - name: Check and set Rust version
      run: ./scripts/check_rust_version.sh
    - name: Install pnpm
      run: |
        curl -fsSL https://get.pnpm.io/install.sh | env PNPM_VERSION=10 sh -
        echo "$HOME/.local/share/pnpm" >> $GITHUB_PATH
    - name: Check formatting
      run: cargo fmt --check
    - name: Build
      run: cargo build --release --verbose
    - name: Debug Test
      run: |
        echo "export fn main = (GBuffer([1.i32, 2.i32, 3.i32, 4.i32])!!).map(fn (val: gi32) = val + 2).read.print;" > test.ln
        cargo run --release -- compile test.ln
        ./test
    - if: ${{ github.ref_name == 'main' }}
      name: Run tests
      run: cargo test --release --verbose -- --include-ignored
    - if: ${{ github.ref_name != 'main' }}
      name: Run tests with Node 23
      run: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
        nvm install 23
        nvm use 23
        cargo test --release --verbose
    - if: ${{ github.ref_name != 'main' }}
      name: Run tests with Node 22
      run: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
        nvm install 22
        nvm use 22
        cargo test --release --verbose
    - if: ${{ github.ref_name != 'main' }}
      name: Run tests with Node 20
      run: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
        nvm install 20
        nvm use 20
        cargo test --release --verbose
    - if: ${{ github.ref_name != 'main' }}
      name: Run tests with Node 18
      run: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
        nvm install 18
        nvm use 18
        cargo test --release --verbose
    - name: Run native tests
      run: cargo run --release -- test alan/test.ln
    - name: Run js tests with Node 23
      run: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
        nvm install 23
        nvm use 23
        cargo run --release -- test --js alan/test.ln
    - name: Run js tests with Node 22
      run: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
        nvm install 22
        nvm use 22
        cargo run --release -- test --js alan/test.ln
    - name: Run js tests with Node 20
      run: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
        nvm install 20
        nvm use 20
        cargo run --release -- test --js alan/test.ln
    - name: Run js tests with Node 18
      run: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
        nvm install 18
        nvm use 18
        cargo run --release -- test --js alan/test.ln

  test-windows:
    runs-on: [self-hosted, windows]
    steps:
    - uses: actions/checkout@v4
    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    - name: Update branch URLs for testing
      run: ./scripts/update_branch_urls.sh
    - name: Check and set Rust version
      run: pwsh -File ./scripts/check_rust_version.ps1
    - name: Build
      run: cargo build --release --verbose
    - name: Debug Test
      run: |
        echo "export fn main = (GBuffer([1.i32, 2.i32, 3.i32, 4.i32])!!).map(fn (val: gi32) = val + 2).read.print;" > test.ln
        cargo run --release -- compile test.ln
        ./test
    - if: ${{ github.ref_name == 'main' }}
      name: Run tests
      run: cargo test --release --verbose -- --include-ignored
    - if: ${{ github.ref_name != 'main' }}
      name: Run tests
      run: cargo test --release --verbose
    - name: Run native tests
      run: cargo run --release -- test alan/test.ln
    - name: Run js tests
      run: cargo run --release -- test --js alan/test.ln

  test-arm-linux:
    runs-on: [self-hosted, linux, ARM64]
    steps:
    - uses: actions/checkout@v4
    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    - name: Update branch URLs for testing
      run: ./scripts/update_branch_urls.sh
    - name: Check and set Rust version
      run: ./scripts/check_rust_version.sh
    - name: Install pnpm
      run: npm install -g pnpm
    - name: Build
      run: cargo build --release --verbose
    - name: Debug Test
      run: |
        echo "export fn main = (GBuffer([1.i32, 2.i32, 3.i32, 4.i32])!!).map(fn (val: gi32) = val + 2).read.print;" > test.ln
        cargo run --release -- compile test.ln
        ./test
    - if: ${{ github.ref_name == 'main' }}
      name: Run tests
      run: cargo test --release --verbose -- --include-ignored --nocapture
    - if: ${{ github.ref_name != 'main' }}
      name: Run tests
      run: cargo test --release --verbose -- --nocapture
    - name: Run native tests
      run: cargo run --release -- test alan/test.ln
    - name: Run js tests
      run: cargo run --release -- test --js alan/test.ln

  test-arm-macos:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
    - uses: actions/checkout@v4
    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    - name: Update branch URLs for testing
      run: ./scripts/update_branch_urls.sh
    - name: Check and set Rust version
      run: ./scripts/check_rust_version.sh
    - name: Install pnpm
      run: npm install -g pnpm
    - name: Node deps
      run: yarn && yarn playwright install
    - name: Start web server
      run: yarn start-server
    - name: Build
      run: cargo build --release --verbose
    - name: Debug Test
      run: |
        echo "export fn main = (GBuffer([1.i32, 2.i32, 3.i32, 4.i32])!!).map(fn (val: gi32) = val + 2).read.print;" > test.ln
        cargo run --release -- compile test.ln
        ./test
    - if: ${{ github.ref_name == 'main' }}
      name: Run tests
      run: cargo test --release --verbose -- --include-ignored --nocapture
    - if: ${{ github.ref_name != 'main' }}
      name: Run tests
      run: cargo test --release --verbose -- --nocapture
    - if: always()
      name: Stop web server
      run: yarn stop-server
    - name: Run native tests
      run: cargo run --release -- test alan/test.ln
    - name: Run js tests
      run: cargo run --release -- test --js alan/test.ln
