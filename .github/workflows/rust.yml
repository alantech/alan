name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: ${{ github.workspace }}/.cargo

jobs:
  test:
    runs-on: [self-hosted, linux, X64]
    steps:
    - uses: actions/checkout@v7
    - name: Cache Cargo dependencies
      uses: actions/cache@v6
      with:
        path: |
          ${{ github.workspace }}/.cargo/registry
          ${{ github.workspace }}/.cargo/git
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    - name: Update branch URLs for testing
      run: ./scripts/update_branch_urls.sh
    - name: Check and set Rust version
      run: ./scripts/check_rust_version.sh
    - name: Check formatting
      run: cargo fmt --check
    - name: Build
      run: cargo build --release --verbose
    - name: Debug Test
      run: |
        echo "export fn main = (GBuffer([1.i32, 2.i32, 3.i32, 4.i32])!!).map(fn (val: gi32) = val + 2).read.print;" > test.ln
        cargo run --release -- test.ln
    - if: ${{ github.ref_name == 'main' }}
      name: Run tests
      run: |
        rm -rf ~/.config/alan
        npm install -g pnpm
        cargo test --release --verbose -- --include-ignored
    - if: ${{ github.ref_name != 'main' }}
      name: Run tests with Node 22
      run: |
        rm -rf ~/.config/alan
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
        nvm install 22
        nvm use 22
        npm install -g pnpm
        cargo test --release --verbose
    - if: ${{ github.ref_name != 'main' }}
      name: Run tests with Node 24
      run: |
        rm -rf ~/.config/alan
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
        nvm install 24
        nvm use 24
        npm install -g pnpm
        cargo test --release --verbose
    - if: ${{ github.ref_name != 'main' }}
      name: Run tests with Node 26
      run: |
        rm -rf ~/.config/alan
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
        nvm install 26
        nvm use 26
        npm install -g pnpm
        cargo test --release --verbose
    - name: Run native tests
      run: cargo run --release -- test alan/test.ln
    - name: Run js tests with Node 22
      run: |
        rm -rf ~/.config/alan
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
        nvm install 22
        nvm use 22
        npm install -g pnpm
        cargo run --release -- test --js alan/test.ln
    - name: Run js tests with Node 24
      run: |
        rm -rf ~/.config/alan
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
        nvm install 24
        nvm use 24
        npm install -g pnpm
        cargo run --release -- test --js alan/test.ln
    - name: Run js tests with Node 26
      run: |
        rm -rf ~/.config/alan
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
        nvm install 26
        nvm use 26
        npm install -g pnpm
        cargo run --release -- test --js alan/test.ln
    - name: Rust-managed Benchmarks
      run: cargo bench
    - name: Build Alan-managed Benchmarks
      run: cargo run --release -- compile alan/benches/bench.ln && cargo run --release -- compile alan/benches/buffer_shader_timings.ln
    - name: Alan-managed Benchmarks
      run: ./bench && ./buffer_shader_timings

  test-windows:
    runs-on: [self-hosted, windows]
    steps:
    - uses: actions/checkout@v7
    - name: Cache Cargo dependencies
      uses: actions/cache@v6
      with:
        path: |
          ${{ github.workspace }}/.cargo/registry
          ${{ github.workspace }}/.cargo/git
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    - name: Update branch URLs for testing
      run: ./scripts/update_branch_urls.sh
    - name: Check and set Rust version
      run: pwsh -File ./scripts/check_rust_version.ps1
    - name: Build
      run: cargo build --release --verbose
    - name: Debug Test
      run: |
        echo "export fn main = (GBuffer([1.i32, 2.i32, 3.i32, 4.i32])!!).map(fn (val: gi32) = val + 2).read.print;" > test.ln
        cargo run --release -- compile test.ln
        ./test
    - if: ${{ github.ref_name == 'main' }}
      name: Run tests
      run: cargo test --release --verbose -- --include-ignored
    - if: ${{ github.ref_name != 'main' }}
      name: Run tests
      run: cargo test --release --verbose
    - name: Run native tests
      run: cargo run --release -- test alan/test.ln
    - name: Run js tests
      run: cargo run --release -- test --js alan/test.ln
    - name: Rust-managed Benchmarks
      run: cargo bench

  test-arm-linux:
    runs-on: [self-hosted, linux, ARM64]
    steps:
    - uses: actions/checkout@v7
    - name: Cache Cargo dependencies
      uses: actions/cache@v6
      with:
        path: |
          ${{ github.workspace }}/.cargo/registry
          ${{ github.workspace }}/.cargo/git
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    - name: Update branch URLs for testing
      run: ./scripts/update_branch_urls.sh
    - name: Check and set Rust version
      run: ./scripts/check_rust_version.sh
    - name: Install pnpm
      run: npm install -g pnpm
    - name: Build
      run: cargo build --release --verbose
    - name: Debug Test
      run: |
        echo "export fn main = (GBuffer([1.i32, 2.i32, 3.i32, 4.i32])!!).map(fn (val: gi32) = val + 2).read.print;" > test.ln
        cargo run --release -- compile test.ln
        ./test
    - if: ${{ github.ref_name == 'main' }}
      name: Run tests
      run: cargo test --release --verbose -- --include-ignored --nocapture
    - if: ${{ github.ref_name != 'main' }}
      name: Run tests
      run: cargo test --release --verbose -- --nocapture
    - name: Run native tests
      run: cargo run --release -- test alan/test.ln
    - name: Run js tests
      run: cargo run --release -- test --js alan/test.ln
    - name: Rust-managed Benchmarks
      run: cargo bench

  test-arm-macos:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
    - uses: actions/checkout@v7
    - name: Cache Cargo dependencies
      uses: actions/cache@v6
      with:
        path: |
          ${{ github.workspace }}/.cargo/registry
          ${{ github.workspace }}/.cargo/git
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    - name: Update branch URLs for testing
      run: ./scripts/update_branch_urls.sh
    - name: Check and set Rust version
      run: ./scripts/check_rust_version.sh
    - name: Install pnpm
      run: |
        brew unlink pnpm 2>/dev/null || true
        brew install pnpm@10
        echo "$(brew --prefix pnpm@10)/bin" >> $GITHUB_PATH
    - name: Node deps
      run: pnpm install --frozen-lockfile && pnpm exec playwright install
    - name: Start web server
      run: pnpm start-server
    - name: Build
      run: cargo build --release --verbose
    - name: Debug Test
      run: |
        echo "export fn main = (GBuffer([1.i32, 2.i32, 3.i32, 4.i32])!!).map(fn (val: gi32) = val + 2).read.print;" > test.ln
        cargo run --release -- compile test.ln
        ./test
    - if: ${{ github.ref_name == 'main' }}
      name: Run tests
      run: cargo test --release --verbose -- --include-ignored --nocapture
    - if: ${{ github.ref_name != 'main' }}
      name: Run tests
      run: cargo test --release --verbose -- --nocapture
    - if: always()
      name: Stop web server
      run: pnpm stop-server
    - name: Run native tests
      run: cargo run --release -- test alan/test.ln
    - name: Run js tests
      run: cargo run --release -- test --js alan/test.ln
    - name: Rust-managed Benchmarks
      run: cargo bench
    - name: Build Alan-managed Benchmarks
      run: cargo run --release -- compile alan/benches/bench.ln && cargo run --release -- compile alan/benches/buffer_shader_timings.ln
    - name: Alan-managed Benchmarks
      run: ./bench && ./buffer_shader_timings
